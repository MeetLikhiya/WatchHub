{% extends "watches/base.html" %}

{% block main_content %}

<div class="container mt-5">
    <h2>Forgot Password</h2>

    <p>Enter your email to reset your password.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-success">Send Reset Link</button>
    </form>
</div>

{% endblock %}
